# .github/workflows/ci.yml
# Runs on every push and pull request.
# Shows a green ✓ or red ✗ badge next to every commit on GitHub.
#
# To add the badge to your README, go to:
#   GitHub → Actions → ci → ··· → Create status badge
# Paste the markdown into your README.

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov httpx

      - name: Lint with ruff
        working-directory: backend
        run: ruff check . --ignore E501,E402

      - name: Run tests
        working-directory: backend
        # We skip tests that need real model files (marked with @pytest.mark.integration)
        run: |
          pytest tests/ -v \
            --ignore=tests/test_integration.py \
            --tb=short \
            -x

  frontend:
    name: Frontend — install + build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://churnguard-api.onrender.com
